<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #2C2C2A; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
    .th-teal    { fill: #085041; }
    .th-blue    { fill: #0C447C; }
    .th-purple  { fill: #3C3489; }
    .th-coral   { fill: #712B13; }
    .th-amber   { fill: #633806; }
    .th-gray    { fill: #444441; }
    .ts-teal    { fill: #0F6E56; }
    .ts-blue    { fill: #185FA5; }
    .ts-purple  { fill: #534AB7; }
    .ts-coral   { fill: #993C1D; }
    .ts-amber   { fill: #854F0B; }
    .ts-gray    { fill: #5F5E5A; }
    .arr        { stroke: #888780; stroke-width: 1; fill: none; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle">Dynamic window keypoints — per-driver style deltas</text>

<!-- Inputs -->
<rect x="30" y="50" width="190" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th th-blue" x="125" y="70" text-anchor="middle" dominant-baseline="central">Canonical schema</text>
<text class="ts ts-blue" x="125" y="88" text-anchor="middle" dominant-baseline="central">Fixed windows + apex anchors</text>

<rect x="460" y="50" width="190" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th th-teal" x="555" y="70" text-anchor="middle" dominant-baseline="central">Per-driver telemetry</text>
<text class="ts ts-teal" x="555" y="88" text-anchor="middle" dominant-baseline="central">Each driver's Q1 fastest lap</text>

<!-- Arrows into per-driver detector -->
<line x1="125" y1="106" x2="240" y2="164" class="arr" marker-end="url(#arrow)"/>
<line x1="555" y1="106" x2="440" y2="164" class="arr" marker-end="url(#arrow)"/>

<!-- Per-driver phase detector -->
<rect x="155" y="164" width="370" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th th-purple" x="340" y="184" text-anchor="middle" dominant-baseline="central">Per-driver phase detector</text>
<text class="ts ts-purple" x="340" y="202" text-anchor="middle" dominant-baseline="central">Same anchor-outward logic, search within fixed window</text>

<line x1="340" y1="220" x2="340" y2="250" class="arr" marker-end="url(#arrow)"/>

<!-- Delta label -->
<text class="ts" x="340" y="268" text-anchor="middle">Signed delta vs reference per corner</text>

<!-- Delta boxes -->
<rect x="30" y="278" width="185" height="56" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th th-coral" x="122" y="297" text-anchor="middle" dominant-baseline="central">Braking delta</text>
<text class="ts ts-coral" x="122" y="315" text-anchor="middle" dominant-baseline="central">− late  ·  + early</text>

<rect x="248" y="278" width="185" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th th-purple" x="340" y="297" text-anchor="middle" dominant-baseline="central">Apex speed delta</text>
<text class="ts ts-purple" x="340" y="315" text-anchor="middle" dominant-baseline="central">+ more committed  ·  − cautious</text>

<rect x="466" y="278" width="185" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th th-blue" x="558" y="297" text-anchor="middle" dominant-baseline="central">Throttle delta</text>
<text class="ts ts-blue" x="558" y="315" text-anchor="middle" dominant-baseline="central">− earlier  ·  + later</text>

<!-- Arrows into aggregation -->
<line x1="122" y1="334" x2="220" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="334" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="558" y1="334" x2="460" y2="388" class="arr" marker-end="url(#arrow)"/>

<!-- Load index aggregation -->
<rect x="100" y="388" width="480" height="56" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="th th-amber" x="340" y="408" text-anchor="middle" dominant-baseline="central">Load index aggregation</text>
<text class="ts ts-amber" x="340" y="426" text-anchor="middle" dominant-baseline="central">front_load_index · rear_load_index · lateral_load_index</text>

<!-- Arrows to outputs -->
<line x1="220" y1="444" x2="130" y2="494" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="444" x2="340" y2="494" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="444" x2="550" y2="494" class="arr" marker-end="url(#arrow)"/>

<!-- Output boxes -->
<rect x="28" y="494" width="200" height="56" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th th-gray" x="128" y="514" text-anchor="middle" dominant-baseline="central">Style fingerprint</text>
<text class="ts ts-gray" x="128" y="532" text-anchor="middle" dominant-baseline="central">Per corner, per driver</text>

<rect x="240" y="494" width="200" height="56" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th th-gray" x="340" y="514" text-anchor="middle" dominant-baseline="central">Tyre deg input</text>
<text class="ts ts-gray" x="340" y="532" text-anchor="middle" dominant-baseline="central">Load indices → deg model</text>

<rect x="452" y="494" width="200" height="56" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th th-gray" x="552" y="514" text-anchor="middle" dominant-baseline="central">AI narrative input</text>
<text class="ts ts-gray" x="552" y="532" text-anchor="middle" dominant-baseline="central">Signed deltas → LLM context</text>

</svg>
